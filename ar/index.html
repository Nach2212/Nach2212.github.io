<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta AR | Ignacio Aguayo</title>
    <link rel="icon" href="../assets/Logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #030712;
            overflow: hidden;
        }
        h1 {
            font-family: 'Space Grotesk', sans-serif;
        }
        .glow-ring {
            box-shadow: 0 0 30px 10px rgba(59, 130, 246, 0.3), 0 0 60px 20px rgba(124, 58, 237, 0.2);
            animation: pulse-glow 2s infinite ease-in-out;
        }
        @keyframes pulse-glow {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body class="text-gray-300 flex flex-col justify-between min-h-screen p-6">

    <!-- Canvas background for stars (ambient) -->
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-blue-950/20 via-slate-950 to-slate-950 -z-10"></div>
    
    <div></div> <!-- Spacer -->

    <!-- Main Content -->
    <div class="flex flex-col items-center justify-center text-center max-w-md mx-auto">
        <!-- Glowing Logo Ring -->
        <div class="w-24 h-24 rounded-full bg-slate-900 border border-blue-500/30 flex items-center justify-center mb-8 glow-ring">
            <img src="../assets/Logo.png" alt="IA Logo" class="w-20 h-20 rounded-full object-cover">
        </div>

        <h1 class="text-3xl font-extrabold text-white mb-4 tracking-tight">
            Tarjeta AR <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-indigo-300 to-purple-400">Iniciando...</span>
        </h1>
        
        <!-- Interactive loading text -->
        <p id="status-text" class="text-sm text-gray-400 mb-8 leading-relaxed px-4">
            Cargando la experiencia de Realidad Aumentada en Kivicube. Por favor, permite el acceso a la cámara cuando se te solicite.
        </p>

        <!-- Spinner -->
        <div class="w-8 h-8 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mb-8"></div>

        <!-- Manual redirect button -->
        <a href="https://www.kivicube.com/face-scenes/iPlsCLKi7sQ5HGdbamEQOdkG8iE3WDzK" 
           class="bg-slate-900/60 backdrop-blur border border-slate-800 text-gray-400 hover:text-white hover:bg-slate-800 text-xs font-semibold px-6 py-2.5 rounded-xl transition-all duration-300 shadow-md">
            ¿No fuiste redirigido? Haz clic aquí
        </a>
    </div>

    <!-- Footer -->
    <footer class="text-center text-[10px] text-gray-600 tracking-wider">
        IGNACIO AGUAYO &copy; 2026 | CREATIVE TECHNOLOGIST
    </footer>

    <script>
        const targetUrl = "https://www.kivicube.com/face-scenes/iPlsCLKi7sQ5HGdbamEQOdkG8iE3WDzK";
        
        // Detect browser language
        const lang = navigator.language || navigator.userLanguage;
        const statusEl = document.getElementById('status-text');
        
        if (lang.startsWith('en')) {
            statusEl.textContent = "Loading the Augmented Reality experience on Kivicube. Please allow camera access when prompted.";
            document.querySelector('a').textContent = "Not redirected? Click here";
        }

        // Automatic redirect after 1.8s
        setTimeout(() => {
            window.location.href = targetUrl;
        }, 1800);
    </script>
</body>
</html>
