<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="46%" r="65%">
      <stop offset="0%" stop-color="#0d1830"/>
      <stop offset="100%" stop-color="#05080f"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="1"/>
      <stop offset="55%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="magGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e94fd8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e94fd8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bgGlow)"/>

  <!-- estrellas -->
  <g fill="#8fb8d8">
    <circle cx="60" cy="80" r="1.4" opacity="0.6"/><circle cx="140" cy="220" r="1" opacity="0.4"/>
    <circle cx="720" cy="60" r="1.6" opacity="0.5"/><circle cx="660" cy="500" r="1.2" opacity="0.5"/>
    <circle cx="90" cy="470" r="1" opacity="0.4"/><circle cx="750" cy="330" r="1.3" opacity="0.5"/>
    <circle cx="400" cy="40" r="1" opacity="0.4"/><circle cx="230" cy="550" r="1.1" opacity="0.4"/>
    <circle cx="570" cy="150" r="1" opacity="0.35"/><circle cx="40" cy="330" r="1.2" opacity="0.45"/>
  </g>

  <!-- orbitas -->
  <ellipse cx="400" cy="300" rx="190" ry="190" fill="none" stroke="#1b2740" stroke-width="1.5"/>
  <ellipse cx="400" cy="300" rx="270" ry="270" fill="none" stroke="#1b2740" stroke-width="1.5"/>

  <!-- nodos magenta -->
  <g>
    <circle cx="400" cy="30" r="26" fill="url(#magGlow)"/>
    <circle cx="400" cy="30" r="7" fill="#05080f" stroke="#e94fd8" stroke-width="2.5"/>
    <circle cx="674" cy="470" r="22" fill="url(#magGlow)"/>
    <circle cx="674" cy="470" r="6" fill="#05080f" stroke="#e94fd8" stroke-width="2.5"/>
    <circle cx="130" cy="470" r="18" fill="url(#magGlow)"/>
    <circle cx="130" cy="470" r="5" fill="#05080f" stroke="#e94fd8" stroke-width="2"/>
  </g>
  <!-- nodos cian -->
  <g>
    <circle cx="590" cy="150" r="20" fill="url(#core)"/>
    <circle cx="590" cy="150" r="6" fill="#05080f" stroke="#22d3ee" stroke-width="2.5"/>
    <circle cx="210" cy="150" r="20" fill="url(#core)"/>
    <circle cx="210" cy="150" r="6" fill="#05080f" stroke="#22d3ee" stroke-width="2.5"/>
    <circle cx="150" cy="330" r="16" fill="url(#core)"/>
    <circle cx="150" cy="330" r="5" fill="#05080f" stroke="#22d3ee" stroke-width="2"/>
  </g>

  <!-- nucleo -->
  <circle cx="400" cy="300" r="120" fill="url(#core)"/>
  <circle cx="400" cy="300" r="58" fill="#05080f" stroke="#22d3ee" stroke-width="2.5"/>
  <text x="400" y="311" text-anchor="middle" font-family="Arial Narrow, Arial, sans-serif" font-weight="700"
        font-size="34" letter-spacing="2" fill="#e8f0f8">NEXO</text>
</svg>
